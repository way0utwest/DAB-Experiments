info:
  name: Get reverse relationship
  type: graphql
  seq: 7

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |-
      query Orders {
          orders(filter: { OrderID: { eq: 10249 } }) {
              items {
                  Customers {
                      CompanyName
                      ContactName
                  }
                  OrderDate
                  CustomerID
                  OrderID
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
