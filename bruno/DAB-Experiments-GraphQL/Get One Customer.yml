info:
  name: Get One Customer
  type: graphql
  seq: 2

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |-
      query Customers {
          customers_by_pk(CustomerID: "VINET") {
              CustomerID
              CompanyName
              ContactName
              ContactTitle
              Address
              City
              Region
              PostalCode
              Country
              Phone
              Fax
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
