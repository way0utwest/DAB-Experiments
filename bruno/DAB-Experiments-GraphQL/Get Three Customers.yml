info:
  name: Get Three Customers
  type: graphql
  seq: 4

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |2-
        query Customers {
          customers(
              filter: { or: [{CustomerID: { eq: "VINET" } }
              { CustomerID: {eq: "BONAP"}}
              { CustomerID: {eq: "TOMSP"}}]}
          ) {
              endCursor
              hasNextPage
              items {
                  CustomerID
                  CompanyName
              }
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
