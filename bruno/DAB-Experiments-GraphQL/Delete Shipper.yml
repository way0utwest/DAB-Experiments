info:
  name: Delete Shipper
  type: graphql
  seq: 15

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |-
      mutation DeleteShippers {
          deleteShippers(ShipperID: 7) {
              ShipperID
              CompanyName
              Phone
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
