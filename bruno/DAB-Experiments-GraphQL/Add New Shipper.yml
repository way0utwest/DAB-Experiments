info:
  name: Add New Shipper
  type: graphql
  seq: 9

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |-
      mutation CreateShippers {
          createShippers(item: {
              CompanyName: "Redgate Software"
              Phone: "04412345"
          }) {
              ShipperID
              CompanyName
              Phone
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
