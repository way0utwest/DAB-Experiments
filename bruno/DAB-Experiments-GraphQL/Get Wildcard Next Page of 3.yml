info:
  name: Get Wildcard Next Page of 3
  type: graphql
  seq: 8

graphql:
  method: POST
  url: http://localhost:5000/graphql
  body:
    query: |-
      query Customers {
          customers( first:5 after:"W3siRW50aXR5TmFtZSI6IkN1c3RvbWVycyIsIkZpZWxkTmFtZSI6IkN1c3RvbWVySUQiLCJGaWVsZFZhbHVlIjoiRk9MSUciLCJEaXJlY3Rpb24iOjB9XQ=="
              filter: { CustomerID: { startsWith: "F" } }
          ) {
              endCursor
              hasNextPage
              items {
                  CustomerID
                  CompanyName
              }
             hasNextPage
          endCursor
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
