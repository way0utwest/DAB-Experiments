info:
  name: 6 - Filter Select Cols
  type: http
  seq: 10

http:
  method: GET
  url: http://localhost:5000/api/Orders?$filter=ShipCountry eq 'France'&$select=CustomerID,OrderID,ShipCountry,OrderDate
  params:
    - name: $filter
      value: ShipCountry eq 'France'
      type: query
    - name: $select
      value: CustomerID,OrderID,ShipCountry,OrderDate
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
